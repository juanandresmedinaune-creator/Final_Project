<style>
    .navbar {
        position: relative;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        width: 100%;
        min-height: 72px;
        padding: 0 8px;
        font-family: 'Inter', sans-serif;
    }

    .navbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #ecf2ff;
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        text-decoration: none;
        white-space: nowrap;
    }

    .navbar-brand span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #79e08f;
        box-shadow: 0 0 14px rgba(121, 224, 143, 0.9);
        display: inline-block;
    }

    .nav-group {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        margin-left: auto;
    }

    .navbar-links {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
    }

    .navbar-links a,
    .nav-dropdown > a {
        color: #94a8c6;
        font-size: 0.92rem;
        font-weight: 500;
        text-decoration: none;
        transition: color .2s ease, opacity .2s ease;
        white-space: nowrap;
    }

    .navbar-links a:hover,
    .nav-dropdown > a:hover,
    .navbar-links a.active,
    .nav-dropdown > a.active {
        color: #ffffff;
    }

    .nav-dropdown {
        position: relative;
        display: inline-flex;
        align-items: center;
    }

    .nav-dropdown > a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 0;
    }

    .dropdown-menu {
        position: absolute;
        top: calc(100% - 2px);
        right: 0;
        min-width: 240px;
        background: linear-gradient(180deg, rgba(10,20,38,.98), rgba(8,20,39,.98));
        border: 1px solid rgba(120,160,255,.12);
        border-radius: 14px;
        box-shadow: 0 16px 32px rgba(0,0,0,.35);
        padding: 10px;
        display: none;
        z-index: 3000;
    }

    .dropdown-menu::before {
        content: "";
        position: absolute;
        top: -12px;
        left: 0;
        right: 0;
        height: 12px;
    }

    .dropdown-menu a {
        display: block;
        color: #dbe7ff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 10px 12px;
        border-radius: 10px;
        transition: background .2s ease, color .2s ease;
    }

    .dropdown-menu a:hover {
        background: rgba(121,224,143,.08);
        color: #79e08f;
    }

    .nav-dropdown:hover .dropdown-menu,
    .nav-dropdown:focus-within .dropdown-menu {
        display: block;
    }

    @media (max-width: 1024px) {
        .navbar {
            flex-direction: column;
            align-items: flex-start;
            padding: 14px 0;
        }

        .nav-group {
            width: 100%;
            margin-left: 0;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        .navbar-links {
            width: 100%;
            gap: 12px;
        }

        .nav-dropdown {
            width: 100%;
            display: block;
        }

        .nav-dropdown > a {
            width: 100%;
            justify-content: space-between;
        }

        .dropdown-menu {
            position: static;
            display: block;
            margin-top: 8px;
            width: 100%;
            box-shadow: none;
        }
    }
</style>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <span></span> AgriML
    </a>

    <div class="nav-group">
        <div class="navbar-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="/pests/objectives" class="{% if request.path == '/pests/objectives' %}active{% endif %}">Objectives</a>
            <a href="/pests/objectives#questions">Key Questions</a>
            <a href="/pests/objectives#data">Data Sources</a>
            <a href="/pests/dataEngineering" class="{% if request.path == '/pests/dataEngineering' %}active{% endif %}">Data Engineering</a>
            <a href="/pests/dataEvaluation" class="{% if request.path == '/pests/dataEvaluation' %}active{% endif %}">Data Evaluation</a>
        </div>

        <div class="nav-dropdown">
            <a href="/models/engineering" class="{% if '/models/engineering' in request.path %}active{% endif %}">
                🔧 Model Engineering ▾
            </a>
            <div class="dropdown-menu">
                <a href="/models/engineering">Model Comparison</a>
            </div>
        </div>

        <div class="nav-dropdown">
            <a href="/models/development/logistic-regression" class="{% if '/models/development' in request.path %}active{% endif %}">
                🧪 Model Development ▾
            </a>
            <div class="dropdown-menu">
                <a href="/models/development/logistic-regression">📈 Logistic Regression</a>
            </div>
        </div>

        <div class="nav-dropdown">
            <a href="/models/evaluation/logistic-regression" class="{% if '/models/evaluation' in request.path %}active{% endif %}">
                📊 Evaluation ▾
            </a>
            <div class="dropdown-menu">
                <a href="/models/evaluation/logistic-regression">📈 Logistic Regression</a>
            </div>
        </div>
    </div>
</nav>
